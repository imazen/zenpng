[package]
name = "zenpng"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "AGPL-3.0-or-later"
description = "PNG encoding and decoding with zencodec-types trait integration"
categories = ["multimedia::images", "multimedia::encoding"]
keywords = ["png", "image", "encoder", "decoder", "codec"]
repository = "https://github.com/imazen/zenpng"

[dependencies]
thiserror = { version = "2.0", default-features = false }
rgb = { version = "0.8", default-features = false, features = ["as-bytes"] }
imgref = "1.12"
bytemuck = { version = "1.25", default-features = false, features = ["extern_crate_alloc"] }
enough = "0.4"
zencodec-types = { path = "../zencodec-types" }
zenpixels = { path = "../zenpixels/zenpixels", default-features = false, features = ["buffer"] }
zenquant = { path = "../zenquant", optional = true }
zenflate = { path = "../zenflate" }
archmage = { version = "0.8.6", default-features = false, features = ["macros", "safe_unaligned_simd", "std"] }
safe_unaligned_simd = { version = "0.2.5", default-features = false }
linear-srgb = "0.5.5"
zenzop = { path = "../zenzop", optional = true, default-features = false, features = ["zlib", "std"] }
almost-enough = { version = "0.4", features = ["std"] }

[dev-dependencies]
png = "0.18"
codec-corpus = "1.0.2"
flate2 = "1"
libdeflater = "1.25"
miniz_oxide = "0.8"
zopfli = "0.8"
lodepng = "3.12.2"

[profile.test]
opt-level = 2

[features]
default = ["quantize"]
quantize = ["dep:zenquant"]
joint = ["quantize", "zenquant/joint"]
unchecked = ["zenflate/unchecked"]
zopfli = ["dep:zenzop"]
zencodec = []
_dev = ["archmage/testable_dispatch"]

[[example]]
name = "phase_timing"
required-features = ["_dev"]

[[example]]
name = "decode_bench"
required-features = ["_dev"]

[[example]]
name = "strategy_explorer"
