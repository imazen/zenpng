name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CI: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-26-intel
          - windows-latest
          - windows-11-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zencodec-types"|git = "https://github.com/imazen/zencodec-types"|g' \
            -e 's|path = "\.\./zenpixels/zenpixels"|git = "https://github.com/imazen/zenpixels"|g' \
            -e 's|path = "\.\./zenquant"|git = "https://github.com/imazen/zenquant"|g' \
            -e 's|path = "\.\./zenflate"|git = "https://github.com/imazen/zenflate"|g' \
            -e 's|path = "\.\./zenzop"|git = "https://github.com/imazen/zenzop"|g' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Test (default)
        run: cargo test

      - name: Test (zopfli feature)
        run: cargo test --features zopfli

  i686:
    name: Test (i686)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-i686

      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zencodec-types"|git = "https://github.com/imazen/zencodec-types"|g' \
            -e 's|path = "\.\./zenpixels/zenpixels"|git = "https://github.com/imazen/zenpixels"|g' \
            -e 's|path = "\.\./zenquant"|git = "https://github.com/imazen/zenquant"|g' \
            -e 's|path = "\.\./zenflate"|git = "https://github.com/imazen/zenflate"|g' \
            -e 's|path = "\.\./zenzop"|git = "https://github.com/imazen/zenzop"|g' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Test (i686)
        run: cross test --target i686-unknown-linux-gnu

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zencodec-types"|git = "https://github.com/imazen/zencodec-types"|g' \
            -e 's|path = "\.\./zenpixels/zenpixels"|git = "https://github.com/imazen/zenpixels"|g' \
            -e 's|path = "\.\./zenquant"|git = "https://github.com/imazen/zenquant"|g' \
            -e 's|path = "\.\./zenflate"|git = "https://github.com/imazen/zenflate"|g' \
            -e 's|path = "\.\./zenzop"|git = "https://github.com/imazen/zenzop"|g' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zencodec-types"|git = "https://github.com/imazen/zencodec-types"|g' \
            -e 's|path = "\.\./zenpixels/zenpixels"|git = "https://github.com/imazen/zenpixels"|g' \
            -e 's|path = "\.\./zenquant"|git = "https://github.com/imazen/zenquant"|g' \
            -e 's|path = "\.\./zenflate"|git = "https://github.com/imazen/zenflate"|g' \
            -e 's|path = "\.\./zenzop"|git = "https://github.com/imazen/zenzop"|g' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Check MSRV
        run: cargo hack check --rust-version

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps to git refs
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zencodec-types"|git = "https://github.com/imazen/zencodec-types"|g' \
            -e 's|path = "\.\./zenpixels/zenpixels"|git = "https://github.com/imazen/zenpixels"|g' \
            -e 's|path = "\.\./zenquant"|git = "https://github.com/imazen/zenquant"|g' \
            -e 's|path = "\.\./zenflate"|git = "https://github.com/imazen/zenflate"|g' \
            -e 's|path = "\.\./zenzop"|git = "https://github.com/imazen/zenzop"|g' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
