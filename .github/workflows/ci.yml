name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CI: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-26-intel
          - windows-latest
          - windows-11-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Test (default)
        run: cargo test

      - name: Test (zopfli feature)
        run: cargo test --features zopfli

      - name: Test (unchecked feature)
        run: cargo test --features unchecked

      - name: Test (quantette feature)
        run: cargo test --features quantette

      - name: Test (imagequant feature)
        run: cargo test --features imagequant

  i686:
    name: Test (i686)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-i686

      - name: Test (i686)
        run: cross test --target i686-unknown-linux-gnu

  feature-permutations:
    name: Feature permutations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: feature-perms

      - name: Test (no default features)
        run: cargo test --no-default-features

      - name: Test (zencodec)
        run: cargo test --no-default-features --features zencodec

      - name: Test (quantize + zencodec)
        run: cargo test --features "quantize,zencodec"

      - name: Test (zopfli)
        run: cargo test --features zopfli

      - name: Test (joint)
        run: cargo test --features joint

      - name: Test (imagequant)
        run: cargo test --features imagequant

      - name: Test (quantette)
        run: cargo test --features quantette

      - name: Test (zennode)
        run: cargo test --features zennode

      - name: Test (all features except _dev)
        run: cargo test --features "quantize,imagequant,quantette,joint,unchecked,zopfli,zencodec,zennode"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Clippy (all features)
        run: cargo clippy --all-targets --features "quantize,imagequant,quantette,joint,unchecked,zopfli,zencodec,zennode" -- -D warnings

      - name: Clippy (zencodec only)
        run: cargo clippy --all-targets --no-default-features --features zencodec -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo hack check --rust-version

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2

      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
