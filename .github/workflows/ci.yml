name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==========================================================================
  # Native x86_64 testing
  # ==========================================================================
  test-x64:
    name: Test x64 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          path: zenpng

      - name: Clone sibling repos (path deps)
        run: |
          git clone --depth 1 https://github.com/imazen/zenflate.git zenflate
          git clone --depth 1 https://github.com/imazen/zenquant.git zenquant
          git clone --depth 1 https://github.com/imazen/zenzop.git zenzop
          git clone --depth 1 https://github.com/imazen/zencodec-types.git zencodec-types

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: zenpng -> target

      - name: Test (default features)
        working-directory: zenpng
        run: cargo test

      - name: Test (quantize + zopfli)
        working-directory: zenpng
        run: cargo test --features zopfli

      - name: Test (no default features)
        working-directory: zenpng
        run: cargo test --no-default-features --lib

  # ==========================================================================
  # Native aarch64 testing
  # ==========================================================================
  test-aarch64:
    name: Test aarch64 (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04-arm, name: Linux }
          - { os: macos-latest, name: macOS }

    steps:
      - uses: actions/checkout@v6
        with:
          path: zenpng

      - name: Clone sibling repos (path deps)
        run: |
          git clone --depth 1 https://github.com/imazen/zenflate.git zenflate
          git clone --depth 1 https://github.com/imazen/zenquant.git zenquant
          git clone --depth 1 https://github.com/imazen/zenzop.git zenzop
          git clone --depth 1 https://github.com/imazen/zencodec-types.git zencodec-types

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: zenpng -> target

      - name: Test
        working-directory: zenpng
        run: cargo test

  # ==========================================================================
  # Clippy
  # ==========================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: zenpng

      - name: Clone sibling repos (path deps)
        run: |
          git clone --depth 1 https://github.com/imazen/zenflate.git zenflate
          git clone --depth 1 https://github.com/imazen/zenquant.git zenquant
          git clone --depth 1 https://github.com/imazen/zenzop.git zenzop
          git clone --depth 1 https://github.com/imazen/zencodec-types.git zencodec-types

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: zenpng -> target

      - name: Clippy (default features)
        working-directory: zenpng
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (all optional features)
        working-directory: zenpng
        run: cargo clippy --all-targets --features "quantize,zopfli,zencodec,_dev" -- -D warnings

  # ==========================================================================
  # Format check
  # ==========================================================================
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt -- --check

  # ==========================================================================
  # MSRV check
  # ==========================================================================
  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: zenpng

      - name: Clone sibling repos (path deps)
        run: |
          git clone --depth 1 https://github.com/imazen/zenflate.git zenflate
          git clone --depth 1 https://github.com/imazen/zenquant.git zenquant
          git clone --depth 1 https://github.com/imazen/zenzop.git zenzop
          git clone --depth 1 https://github.com/imazen/zencodec-types.git zencodec-types

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: zenpng -> target

      - name: Check MSRV
        working-directory: zenpng
        run: cargo check

  # ==========================================================================
  # Code coverage
  # ==========================================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          path: zenpng

      - name: Clone sibling repos (path deps)
        run: |
          git clone --depth 1 https://github.com/imazen/zenflate.git zenflate
          git clone --depth 1 https://github.com/imazen/zenquant.git zenquant
          git clone --depth 1 https://github.com/imazen/zenzop.git zenzop
          git clone --depth 1 https://github.com/imazen/zencodec-types.git zencodec-types

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: zenpng -> target

      - name: Generate coverage
        working-directory: zenpng
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: zenpng/lcov.info
          fail_ci_if_error: false

  # ==========================================================================
  # Doc build (catches broken links)
  # ==========================================================================
  doc:
    name: Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: zenpng

      - name: Clone sibling repos (path deps)
        run: |
          git clone --depth 1 https://github.com/imazen/zenflate.git zenflate
          git clone --depth 1 https://github.com/imazen/zenquant.git zenquant
          git clone --depth 1 https://github.com/imazen/zenzop.git zenzop
          git clone --depth 1 https://github.com/imazen/zencodec-types.git zencodec-types

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: zenpng -> target

      - name: Build docs
        working-directory: zenpng
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --features "quantize,zopfli,zencodec"
